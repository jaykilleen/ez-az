# Spotlight question deck
#
# Each round, one player is the Spotlight. The {spotlight} token is replaced
# with their name when the question is shown.
#
# Questions are open-ended on purpose. The Spotlight types their real answer
# privately on their phone. Everyone else guesses what they think the Spotlight
# would say. Matches score 2pt. The Spotlight then picks their favourite
# non-matching guess for a 3pt bonus.
#
# Keep it: family friendly, kid-readable, evergreen (no dates / pop refs that age).
# Categories are short tags shown as a badge on the TV.

